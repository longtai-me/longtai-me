<script>
document.addEventListener('DOMContentLoaded', () => {
  const configs = [
    {
      url: 'public/json/experiences.json',
      id: 'experience-container',
      tpl: i => `<a target="_blank" href="${i.link || '#'}"><div class="card"><br/><img loading="lazy" src="${i.img}" alt="${i.alt}" height="60px"><p style="font-size:20px;">${i.title}<br/>${i.subtitle ? i.subtitle + '<br/>' : ''}${i.role}</p></div></a>`
    },
    {
      url: 'public/json/friends.json',
      id: 'friends-container',
      tpl: f => `<a target="_blank" href="${f.link}"><div class="friend-card"><div class="friend-avatar"><img loading="lazy" src="${f.avatar}" alt="${f.name}"></div><p>${f.name}</p></div></a>`,
      suffix: `<a target="_blank" href="https://github.com/long-tai-0925/NEW-ME/pulls"><div class="friend-card"><div class="friend-avatar"><h1>+</h1></div><p>缺你一個</p></div></a>`
    },
    {
      url: 'public/json/support.json',
      id: 'support-container',
      tpl: s => `<div class="card"><br/><img loading="lazy" src="${s.img}" alt="${s.alt}" height="60px"><p style="font-size:20px;">${s.title}<br/>${s.subtitle ? s.subtitle + '<br/>' : ''}${s.desc}</p></div>`
    },
    {
      url: 'public/json/ads.json',
      id: 'ads-container',
      tpl: a => `<div class="card"><img loading="lazy" src="${a.img}" alt="${a.alt}" height="60px"><h3 style="font-size:30px;">${a.title}</h3><p style="font-size:20px;">${a.desc}</p></div>`
    }
  ];

  configs.forEach(conf => {
    const el = document.getElementById(conf.id);
    if (!el) return;
    fetch(conf.url)
      .then(res => res.json())
      .then(data => el.innerHTML = data.map(conf.tpl).join('') + (conf.suffix || ''))
      .catch(err => console.error(`Error loading ${conf.url}:`, err));
  });
});
</script>
