<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LongTai Jiang</title>

  <style>
    :root {
      --primary: #00a8f0;
      --bg: #1b212c;
      --card: #222222;
      --card-2: #333333;
      --text: #ffffff;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a { text-decoration: none; color: inherit; }

    header {
      position: sticky;
      top: 0;
      background: rgba(27, 33, 44, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #2a2f3a;
      z-index: 100;
    }

    .nav {
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: var(--primary);
    }

    .nav-links { display: flex; gap: 20px; }
    .nav-links a:hover { color: var(--primary); }

    .hero {
      text-align: center;
      padding: 120px 20px 80px;
      background: radial-gradient(circle at top, rgba(0,168,240,0.15), transparent 60%);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #0077aa);
      margin: auto;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
    }

    .hero h1 { font-size: 48px; }
    .hero span { color: var(--primary); }
    .hero p { color: var(--muted); }

    .btn {
      display: inline-block;
      padding: 12px 26px;
      background: var(--primary);
      border-radius: 999px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0,168,240,0.4);
    }

    section {
      max-width: 1100px;
      margin: auto;
      padding: 70px 20px;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 25px;
      border-left: 4px solid var(--primary);
      padding-left: 10px;
    }

    .card {
      background: var(--card);
      padding: 25px;
      border-radius: 18px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      background: var(--card-2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .tags { margin-top: 10px; }
    .tag {
      display: inline-block;
      background: #111;
      padding: 5px 10px;
      margin: 4px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }

    /* SOCIALS */
    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .social-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: 0.3s;
      border: 1px solid #2a2f3a;
    }

    .social-icon:hover {
      background: var(--card-2);
      transform: translateY(-5px);
      box-shadow: 0 0 10px rgba(0,168,240,0.3);
    }

    /* FRIENDS */
    .friends {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
    }

    .friend-card {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      transition: 0.3s;
    }

    .friend-card:hover {
      transform: translateY(-6px);
      background: var(--card-2);
    }

    .friend-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin: auto;
      margin-bottom: 10px;
      overflow: hidden;
      background: #444;
    }

    .friend-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      border-top: 1px solid #2a2f3a;
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 34px; }
    }
  </style>
</head>
