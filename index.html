<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="icon/me.png">
  <title>LongTai Jiang</title>

  <style>
    :root {
      --primary: #00a8f0;
      --bg: #1b212c;
      --card: #222222;
      --card-2: #333333;
      --text: #ffffff;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    a { text-decoration: none; color: inherit; }

    header {
      position: sticky;
      top: 0;
      background: rgba(27, 33, 44, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #2a2f3a;
      z-index: 100;
      transition: 0.3s;
    }

    .nav {
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 20px;
    }

    .logo {
      font-size: 30px;
      font-weight: bold;
      color: var(--primary);
    }

    .nav-links { display: flex; gap: 20px; }
    .nav-links a:hover { color: var(--primary); }

    .hero {
      text-align: center;
      padding: 120px 20px 80px;
      background: radial-gradient(circle at top, rgba(0,168,240,0.15), transparent 60%);
    }

    .hero img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .hero h1 { font-size: 48px; }

    .typing {
      border-right: 2px solid var(--primary);
      white-space: nowrap;
      overflow: hidden;
      display: inline-block;
      color: var(--primary);
    }

    .hero p { color: var(--muted); }

    .btn {
      display: inline-block;
      padding: 12px 26px;
      background: var(--primary);
      border-radius: 999px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0,168,240,0.4);
    }

    section {
      max-width: 1100px;
      margin: auto;
      padding: 20px 20px;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 25px;
      border-left: 4px solid var(--primary);
      padding-left: 10px;
    }

    .card {
      background: var(--card);
      padding: 25px;
      border-radius: 18px;
      transition: 0.3s;
      will-change: transform;
    }

    .card:hover {
      transform: translateY(-8px);
      background: var(--card-2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .tags { margin-top: 10px; }

    .tag {
      display: inline-block;
      background: #111;
      padding: 5px 10px;
      margin: 4px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .social-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      will-change: transform;
    }

    .social-icon:hover {
      background: var(--card-2);
      transform: translateY(-5px);
      box-shadow: 0 0 10px rgba(0,168,240,0.3);
    }

    .friends {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
    }

    .friend-card {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      transition: 0.3s;
      will-change: transform;
    }

    .friend-card:hover {
      transform: translateY(-6px);
      background: var(--card-2);
    }

    .friend-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin: auto;
      margin-bottom: 10px;
      overflow: hidden;
      background: #444;
    }

    .friend-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      border-top: 1px solid #2a2f3a;
    }

    /* 滾動動畫 */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s ease;
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 34px; }
    }
  </style>
</head>

<body>

<header>
  <div class="nav">
    <div class="logo">Jiang</div>
    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#projects">Experience</a>
      <a href="#social">Social</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</header>

<div class="hero">
  <img loading="lazy" src="https://www.gravatar.com/avatar/64a851c812177321ca40d671ad3c014a?d=mp&s=200">
  <h1>Hi, I'm <span class="typing"></span></h1>
  <p>學生 / 未來軟體開發者</p>
  <a href="#about" class="btn">認識我</a>
</div>

<section id="about">
  <h2>About Me</h2>
  <div class="card">
    <p>目前就讀國立台中科技大學</p>
    <p>正在資訊社群亂竄</p>
    <div class="tags">
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">Python</span>
    </div>
  </div>
</section>

<section id="projects">
  <h2>Experience</h2>
  <div class="grid">
    <div class="card">SCAICT - 第四屆臨時工人</div>
    <div class="card">SCAICT - 第五屆臨時工人</div>
  </div>
</section>

<section id="social">
  <h2>Socials</h2>
  <div class="socials">
    <a href="https://github.com/long-tai-0925">
      <div class="social-icon"><img loading="lazy" src="icon/GitHub.png" width="60"></div>
    </a>
    <a href="https://t.me/lcngtai">
      <div class="social-icon"><img loading="lazy" src="icon/Telegram.png" width="60"></div>
    </a>
  </div>
</section>

<section>
  <h2>Dalao</h2>
  <div class="friends">
    <div class="friend-card"><div class="friend-avatar"><img loading="lazy" src="https://www.gravatar.com/avatar/cd21846d91e039ae2418bbe6033a762b?d=mp&s=200"></div><p>Leinuo</p></div>
    <div class="friend-card"><div class="friend-avatar"><img loading="lazy" src="https://www.gravatar.com/avatar/7d325263108d4e286af9797fbe802e2b?d=mp&s=200"></div><p>Wuzuan</p></div>
  </div>
</section>

<footer>
  <p>© 2026 LongTai Jiang</p>
</footer>

<script>
/* 滾動動畫 */
const reveals = document.querySelectorAll('.card, .friend-card, .social-icon');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('active');
    }
  });
}, { threshold: 0.1 });

reveals.forEach(el => {
  el.classList.add('reveal');
  observer.observe(el);
});

/* 打字效果 */
const text = "LongTai";
const target = document.querySelector(".typing");

let i = 0;

function type() {
  if (i < text.length) {
    target.textContent += text.charAt(i);
    i++;
    setTimeout(type, 120);
  }
}
type();

/* Navbar 縮小 */
const header = document.querySelector("header");

window.addEventListener("scroll", () => {
  if (window.scrollY > 50) {
    header.style.padding = "10px 0";
  } else {
    header.style.padding = "0";
  }
});
</script>

</body>
</html>
