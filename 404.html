<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/public/images/me.png" />
    <title>正在導向...</title>
    <style>
      :root {
        --primary: #00a8f0;
        --bg: #1b212c;
        --text: #ffffff;
        --muted: #9ca3af;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      #status {
        width: min(90vw, 420px);
        display: grid;
        justify-items: center;
        gap: 14px;
        text-align: center;
      }

      .loader {
        width: 34px;
        height: 34px;
        border: 4px solid rgba(255, 255, 255, 0.18);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main id="status" aria-live="polite">
      <div class="loader" aria-label="正在導向"></div>
    </main>

    <script>
      async function redirect() {
        const status = document.getElementById("status");
        const rawPath = window.location.pathname.replace(/^\/+|\/+$/g, "");
        const path = decodeURIComponent(rawPath).toLowerCase();

        try {
          const response = await fetch("public/json/links.json", { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`links.json responded with ${response.status}`);
          }

          const links = await response.json();

          if (links[path]) {
            window.location.replace(links[path]);
            return;
          }

          status.replaceChildren();

          const title = document.createElement("h1");
          title.textContent = "404 找不到連結";

          const message = document.createElement("p");
          message.textContent = `路徑 "/${rawPath}" 不存在。`;

          const homeLink = document.createElement("a");
          homeLink.href = "/";
          homeLink.textContent = "回到首頁";

          status.append(title, message, homeLink);
        } catch (error) {
          console.error("載入設定檔失敗:", error);
          status.textContent = "系統錯誤，請稍後再試。";
        }
      }

      redirect();
    </script>
  </body>
</html>
